<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026년 1학기 데이터론</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #f4f6fb;
  --card:   #ffffff;
  --border: #d8dce8;
  --accent: #0d9488;
  --text:   #1e293b;
  --muted:  #64748b;
  --mono:   'IBM Plex Mono', monospace;
  --sans:   'IBM Plex Sans KR', sans-serif;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  font-family: var(--sans);
  color: var(--text);
}

/* ─── HEADER ─── */
header {
  padding: 4rem 2rem 3rem;
  text-align: center;
}

.eyebrow {
  font-family: var(--mono);
  font-size: .72rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 1rem;
}

header h1 {
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 700;
  line-height: 1.2;
  color: var(--text);
}

.sub {
  margin-top: .6rem;
  font-size: .95rem;
  color: var(--muted);
  font-weight: 300;
}

/* ─── DIVIDER ─── */
.divider {
  width: 40px;
  height: 2px;
  background: var(--accent);
  margin: 2.5rem auto;
  border-radius: 1px;
}

/* ─── TABS / CARDS ─── */
.cards {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 2rem 6rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.section-label {
  font-family: var(--mono);
  font-size: .68rem;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: .3rem;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: .85rem;
  padding: 1.5rem 1.8rem;
  display: flex;
  align-items: center;
  gap: 1.4rem;
  text-decoration: none;
  color: inherit;
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
  transition: box-shadow .2s, transform .2s, border-color .2s;
}

.card:hover {
  box-shadow: 0 6px 24px rgba(0,0,0,.09);
  transform: translateY(-2px);
  border-color: var(--accent);
}

.card-icon {
  font-size: 1.8rem;
  flex-shrink: 0;
}

.card-body {
  flex: 1;
}

.card-title {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: .25rem;
}

.card-desc {
  font-size: .82rem;
  color: var(--muted);
  line-height: 1.6;
}

.card-tags {
  display: flex;
  gap: .4rem;
  flex-wrap: wrap;
  margin-top: .55rem;
}

.tag {
  font-family: var(--mono);
  font-size: .62rem;
  padding: .15rem .55rem;
  border-radius: 1rem;
  border: 1px solid var(--border);
  color: var(--muted);
  background: var(--bg);
}

.card-arrow {
  font-size: 1.1rem;
  color: var(--border);
  flex-shrink: 0;
  transition: color .2s, transform .2s;
}

.card:hover .card-arrow {
  color: var(--accent);
  transform: translateX(3px);
}

/* ─── FOOTER ─── */
footer {
  text-align: center;
  padding: 2rem;
  font-family: var(--mono);
  font-size: .68rem;
  color: var(--muted);
  border-top: 1px solid var(--border);
}
</style>
</head>
<body>

<header>
  <div class="eyebrow">2026 · 1학기</div>
  <h1>데이터론</h1>
  <p class="sub">강의자료 모음 · JeongYun Lee</p>
</header>

<div class="divider"></div>

<div class="cards">
  <div class="section-label">파이썬 기초</div>

  <a class="card" href="slides/week07.html">
    <div class="card-icon">🐍</div>
    <div class="card-body">
      <div class="card-title">파이썬 기초 문법 총정리</div>
      <div class="card-desc">데이터형 · 컬렉션 · 연산자 · 제어문 · 함수 · 예외처리 · 정규표현식</div>
      <div class="card-tags">
        <span class="tag">Week 07</span>
        <span class="tag">슬라이드</span>
        <span class="tag">퀴즈 포함</span>
      </div>
    </div>
    <div class="card-arrow">→</div>
  </a>
</div>

<footer>
  cathx618@cau.ac.kr
</footer>

</body>
</html>
